<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Fundadores · NQ PROJECT</title>
<style>
  :root{
    --bg:#000;--ink:#fff;--muted:#8a8a8a;--line:rgba(255,255,255,.20);
    --pad:24px;--font:"Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}

  .page{position:relative;min-height:100dvh;width:100%;display:flex;align-items:center;justify-content:center;
    padding:36px 16px}
  .fx{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

  .app{position:relative;z-index:1;width:100%;max-width:460px;margin:0 auto;background:var(--bg);
    border-radius:22px;overflow:hidden;animation:appIn .6s ease both}
  @keyframes appIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .content{position:relative;z-index:1;display:flex;flex-direction:column;padding:26px var(--pad) 30px}
  .content>*{animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .backbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.05);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;text-decoration:none}
  .backbtn svg{width:16px;height:16px}
  .backbtn svg path{stroke:#fff}
  .header-spacer{width:38px;height:38px;flex:0 0 auto}
  .brand-mark{flex:1;height:20px;display:block}

  .eyebrow{text-align:center;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);
    margin-bottom:6px}
  .pagetitle{text-align:center;font-size:22px;font-weight:600;letter-spacing:-.01em;margin-bottom:34px}

  .founders{display:flex;flex-direction:column;gap:22px}
  .founder-card{border:1px solid rgba(255,255,255,.10);border-radius:20px;overflow:hidden;background:rgba(255,255,255,.02)}
  .founder-photo{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;filter:grayscale(1);background:#111}
  .founder-body{padding:20px 20px 22px}
  .founder-name{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:2px}
  .founder-role{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .founder-bio{font-size:13.5px;line-height:1.55;color:#c9c9c9;margin-bottom:18px}
  .ig-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px 0;
    border-radius:100px;background:#fff;color:#000;text-decoration:none;font-size:12.5px;font-weight:600;
    letter-spacing:.06em;text-transform:uppercase}
  .ig-btn svg{width:16px;height:16px}
  .ig-btn svg path,.ig-btn svg rect,.ig-btn svg circle{stroke:#000}

  .foot{text-align:center;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:#3a3a3a;
    font-weight:600;padding-top:30px}
  .foot a{color:#5a5a5a;text-decoration:none}
  .foot a:hover{color:#fff}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.05ms !important}
  }
</style>
</head>
<body>
<canvas class="fx" id="fx"></canvas>
<div class="page">
  <div class="app">
    <div class="content">
      <div class="header">
        <a class="backbtn" href="index.html" aria-label="Volver a FOCO">
          <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <svg class="brand-mark" viewBox="114 147 1071 316" role="img" aria-label="FOCO">
          <g transform="translate(378.69,208.02) scale(1.0424)">
            <path d="M127.95,27.18 A78,78 0 1,1 72.05,27.18" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
            <circle cx="100" cy="16" r="10" fill="#ffffff"/>
          </g>
          <text x="150.00" y="400.00" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="260" fill="#ffffff">F</text>
          <text x="656.74" y="400.00" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="260" fill="#ffffff">C</text>
          <text x="917.26" y="400.00" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="260" fill="#ffffff">O</text>
        </svg>
        <div class="header-spacer"></div>
      </div>

      <div class="eyebrow">NQ Project</div>
      <div class="pagetitle">Fundadores</div>

      <div class="founders">
        <div class="founder-card">
          <img class="founder-photo" src="soyhomie.jpg" alt="Foto de Alexis, @soyhomie">
          <div class="founder-body">
            <div class="founder-name">Soyhomie</div>
            <div class="founder-role" style="margin-bottom:18px">Cofundador · NQ Project</div>
            <a class="ig-btn" href="https://instagram.com/soyhomie" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke-width="1.8"/><circle cx="12" cy="12" r="4" stroke-width="1.8"/><circle cx="17.3" cy="6.7" r="1.1" fill="#000"/></svg>
              @soyhomie
            </a>
          </div>
        </div>

        <div class="founder-card">
          <img class="founder-photo" src="fxjaviargaez.jpg" alt="Foto de Javi, @fxjaviargaez">
          <div class="founder-body">
            <div class="founder-name">Fxjaviargaez</div>
            <div class="founder-role" style="margin-bottom:18px">Cofundador · NQ Project</div>
            <a class="ig-btn" href="https://instagram.com/fxjaviargaez" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke-width="1.8"/><circle cx="12" cy="12" r="4" stroke-width="1.8"/><circle cx="17.3" cy="6.7" r="1.1" fill="#000"/></svg>
              @fxjaviargaez
            </a>
          </div>
        </div>
      </div>

      <div class="foot"><a href="index.html">← Volver a FOCO</a> · NQ Project</div>
    </div>
  </div>
</div>

<script>
(function(){
  const c = document.getElementById('fx');
  if(!c) return;
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const ctx = c.getContext('2d');
  let w=0,h=0,dpr=1,parts=[];
  function size(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    const r = c.getBoundingClientRect();
    w=r.width; h=r.height; c.width=w*dpr; c.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function init(){
    const n = Math.max(30, Math.min(60, Math.round(w*h/8000)));
    parts = Array.from({length:n}, ()=>({
      x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.3+.4,
      vy:-(Math.random()*.12+.03), vx:(Math.random()-.5)*.07,
      a:Math.random()*.22+.04, tw:Math.random()*Math.PI*2
    }));
  }
  function tick(){
    ctx.clearRect(0,0,w,h);
    for(const p of parts){
      p.y+=p.vy; p.x+=p.vx; p.tw+=0.018;
      if(p.y<-6){p.y=h+6;p.x=Math.random()*w;}
      if(p.x<-6)p.x=w+6; if(p.x>w+6)p.x=-6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.283);
      ctx.fillStyle='rgba(255,255,255,'+(p.a*(0.6+0.4*Math.sin(p.tw)))+')'; ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  size(); init();
  window.addEventListener('resize', ()=>{ size(); init(); });
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
